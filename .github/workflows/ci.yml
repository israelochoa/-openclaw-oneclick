name: ci

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - shell: bash
          - shell: sh
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck jq

      - name: ShellCheck
        run: shellcheck scripts/*.sh tests/*.sh

      - name: Validate compose
        run: docker compose config

      - name: Validate JSON config
        run: |
          jq empty config/openclaw.json.template
          jq empty config/agents-defaults.json

      - name: Smoke tests
        run: |
          ./tests/test-docker-compose.sh
          ./tests/test-config.sh
